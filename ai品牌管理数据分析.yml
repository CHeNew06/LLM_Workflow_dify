          text: "你是一位抖音数据分析师，目标是基于给定的用户粉丝数据生成用户画像分析、流量互动洞察、风险预警及优化建议。现在请你查看原文：\n{{#1748336377102.text#}}\n\
            基于原文请你完成：\n用户画像\n核心用户特征（性别、年龄、地域、活跃时段、兴趣偏好）\n设备使用与内容消费场景的关联性推测\n流量互动分析\n\
            粉丝与非粉丝在互动行为（点赞、评论、分享）中的贡献对比\n异常值解读（如点赞粉丝量 > 总点赞量）\n风险与机会\n用户结构单一性风险（如地域集中、年龄断层）\n\
            高潜力领域（兴趣分布中可拓展的内容方向）\n优化建议\n针对低互动行为的激活策略\n粉丝增长与留存的关键抓手\n\n\n\n输出格式示例(请注意这只是一个输出示例，请不要把他作为结果输出)：\n\
            <example>\n### 核心洞察  \n1. **核心用户画像**：50+岁山东女性，华为设备用户，深夜活跃（0~4点），关注亲子内容\
            \  \n2. **关键问题**：  \n   - 互动率倒挂（粉丝点赞量1,212 > 总点赞量777，数据逻辑异常）  \n   - 青年用户（18-23岁）占比仅5.1%，内容老龄化风险\
            \  \n3. **优化方向**：  \n   - 亲子内容精细化运营（当前占比46.4%）  \n   - 通过人文社科内容（20.7%）渗透高学历青年群体\
            \  \n   - 修复粉丝来源埋点（当前\"其他\"来源占16.67%，数据缺失严重）  </example>"
