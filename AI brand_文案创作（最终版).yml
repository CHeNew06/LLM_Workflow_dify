            3. 英文或者数字，与中文之间应该有一个空格。

            4. 请注意用户强调的专有名词。

            5. 一定不能超过20个字，这一点很重要，一定要遵守，。

            6. 不能有 emoji，不要使用 emoji，不要用 emoji！

            7. 别用太俗的比喻和类比，宁愿用语气词夸张一点

            8.必须是连贯的一句话，且符合一个标题该有的特征。

            9. 不要在句首和句末添加引号。

            10.标题必须只是一句连贯的句子，不能超过20字。'
